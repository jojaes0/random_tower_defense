name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest # 리눅스 → 로컬(Node24+Windows) 빌드 크래시와 무관
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5 # 실행 중 Pages 보장 활성화 → "Pages not enabled" 404 방지
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # LTS
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
